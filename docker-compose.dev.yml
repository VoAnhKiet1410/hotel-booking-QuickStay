version: '3.8'

services:
  # ─── API Gateway ────────────────────────────
  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    env_file: ./gateway/.env
    depends_on:
      - auth-service
      - hotel-service
      - booking-service
      - payment-service
      - notification-service
      - chat-service
      - review-service
      - promo-service
      - operations-service
    networks:
      - hotel-network

  # ─── Auth Service ───────────────────────────
  auth-service:
    build: ./services/auth-service
    ports:
      - "3001:3001"
    env_file: ./services/auth-service/.env
    networks:
      - hotel-network

  # ─── Hotel & Room Service ───────────────────
  hotel-service:
    build: ./services/hotel-service
    ports:
      - "3002:3002"
    env_file: ./services/hotel-service/.env
    networks:
      - hotel-network

  # ─── Booking Service ────────────────────────
  booking-service:
    build: ./services/booking-service
    ports:
      - "3003:3003"
    env_file: ./services/booking-service/.env
    networks:
      - hotel-network

  # ─── Payment Service ────────────────────────
  payment-service:
    build: ./services/payment-service
    ports:
      - "3004:3004"
    env_file: ./services/payment-service/.env
    networks:
      - hotel-network

  # ─── Notification Service ───────────────────
  notification-service:
    build: ./services/notification-service
    ports:
      - "3005:3005"
    env_file: ./services/notification-service/.env
    networks:
      - hotel-network

  # ─── Chat Service ──────────────────────────
  chat-service:
    build: ./services/chat-service
    ports:
      - "3006:3006"
    env_file: ./services/chat-service/.env
    networks:
      - hotel-network

  # ─── Review Service ────────────────────────
  review-service:
    build: ./services/review-service
    ports:
      - "3007:3007"
    env_file: ./services/review-service/.env
    networks:
      - hotel-network

  # ─── Promo Service ─────────────────────────
  promo-service:
    build: ./services/promo-service
    ports:
      - "3008:3008"
    env_file: ./services/promo-service/.env
    networks:
      - hotel-network

  # ─── Operations Service ────────────────────
  operations-service:
    build: ./services/operations-service
    ports:
      - "3009:3009"
    env_file: ./services/operations-service/.env
    networks:
      - hotel-network

  # ─── Client (React SPA) ────────────────────
  client:
    build: ./client
    ports:
      - "5173:5173"
    env_file: ./client/.env
    depends_on:
      - gateway
    networks:
      - hotel-network

networks:
  hotel-network:
    driver: bridge
